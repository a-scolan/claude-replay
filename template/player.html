<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Replay</title>
<style>
/*THEME_CSS*/

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0;
}

/* Controls bar */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.controls button {
  background: var(--bg-hover);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.controls button:hover { background: var(--border); }
.controls button.active { background: var(--accent-dim); border-color: var(--accent); }

.progress-wrap {
  flex: 1;
  min-width: 120px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.2s;
}

.progress-text {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.speed-control input[type="range"] {
  width: 60px;
  accent-color: var(--accent);
}

.toggle-group {
  display: flex;
  gap: 6px;
  font-size: 11px;
}
.toggle-group label {
  display: flex;
  align-items: center;
  gap: 3px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.toggle-group input[type="checkbox"] { accent-color: var(--accent); }

/* Transcript area */
.transcript {
  padding: 16px;
  min-height: calc(100vh - 50px);
}

.turn {
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}
.turn.visible {
  opacity: 1;
  transform: translateY(0);
}

/* User message */
.user-msg {
  margin-bottom: 8px;
}
.user-prompt {
  color: var(--accent);
  font-weight: 600;
}
.user-text {
  color: var(--text-bright);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Timestamp */
.timestamp {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

/* Assistant text */
.assistant-text {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  margin: 6px 0;
  padding-left: 4px;
}

/* Tool call */
.tool-block {
  margin: 6px 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--tool-bg);
}
.tool-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.tool-header:hover { background: var(--bg-hover); }
.tool-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  flex-shrink: 0;
}
.tool-name {
  color: var(--cyan);
  font-weight: 600;
}
.tool-args-preview {
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.tool-chevron {
  color: var(--text-dim);
  font-size: 10px;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.tool-block.open .tool-chevron { transform: rotate(90deg); }

.tool-body {
  display: none;
  border-top: 1px solid var(--border);
}
.tool-block.open .tool-body { display: block; }

.tool-input, .tool-result {
  padding: 8px 10px;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}
.tool-input {
  color: var(--text-dim);
  background: var(--tool-bg);
}
.tool-result {
  background: var(--bg);
  border-top: 1px solid var(--border);
  color: var(--green);
}
.tool-result-label, .tool-input-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 600;
}

/* Thinking block */
.thinking-block {
  margin: 6px 0;
  border-left: 2px solid var(--text-dim);
  padding-left: 10px;
}
.thinking-header {
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.thinking-header:hover { color: var(--text); }
.thinking-chevron {
  font-size: 10px;
  transition: transform 0.2s;
}
.thinking-block.open .thinking-chevron { transform: rotate(90deg); }
.thinking-body {
  display: none;
  color: var(--text-dim);
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  margin-top: 4px;
  max-height: 400px;
  overflow-y: auto;
}
.thinking-block.open .thinking-body { display: block; }

/* Typing cursor */
.cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>
<div class="container">
  <div class="controls">
    <button id="btn-prev" title="Previous turn">&larr;</button>
    <button id="btn-play" title="Play / Pause">&#9654;</button>
    <button id="btn-next" title="Next turn">&rarr;</button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 0</span>
    </div>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speed-slider" min="0.5" max="5" step="0.5" value="/*INITIAL_SPEED*/">
      <span id="speed-label">/*INITIAL_SPEED*/x</span>
    </div>
    <div class="toggle-group">
      <label><input type="checkbox" id="toggle-thinking" /*CHECKED_THINKING*/> Thinking</label>
      <label><input type="checkbox" id="toggle-tools" /*CHECKED_TOOLS*/> Tools</label>
      <label><input type="checkbox" id="toggle-results" /*CHECKED_RESULTS*/> Results</label>
    </div>
  </div>
  <div class="transcript" id="transcript"></div>
</div>

<script>
(function() {
  "use strict";

  const TURNS = /*TURNS_JSON*/[];
  let currentTurn = 0;
  let playing = false;
  let playTimer = null;
  let speed = /*INITIAL_SPEED*/1;

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const transcript = $("#transcript");
  const btnPlay = $("#btn-play");
  const btnPrev = $("#btn-prev");
  const btnNext = $("#btn-next");
  const progressFill = $("#progress-fill");
  const progressText = $("#progress-text");
  const progressBar = $("#progress-bar");
  const speedSlider = $("#speed-slider");
  const speedLabel = $("#speed-label");
  const toggleThinking = $("#toggle-thinking");
  const toggleTools = $("#toggle-tools");
  const toggleResults = $("#toggle-results");

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function truncate(text, max) {
    if (!text) return "";
    const s = typeof text === "string" ? text : JSON.stringify(text);
    const oneLine = s.replace(/\n/g, " ").trim();
    return oneLine.length > max ? oneLine.slice(0, max) + "..." : oneLine;
  }

  function formatInput(input) {
    if (typeof input === "string") return escapeHtml(input);
    try {
      return escapeHtml(JSON.stringify(input, null, 2));
    } catch {
      return escapeHtml(String(input));
    }
  }

  function renderTurn(turn) {
    const el = document.createElement("div");
    el.className = "turn";
    el.dataset.index = turn.index;

    let html = "";

    // Timestamp
    if (turn.timestamp) {
      const d = new Date(turn.timestamp);
      const ts = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      html += `<div class="timestamp">${ts}</div>`;
    }

    // User message
    if (turn.user_text) {
      html += `<div class="user-msg"><span class="user-prompt">&gt; </span><span class="user-text">${escapeHtml(turn.user_text)}</span></div>`;
    }

    // Assistant blocks
    for (const block of turn.blocks) {
      if (block.kind === "text") {
        html += `<div class="assistant-text">${escapeHtml(block.text)}</div>`;
      } else if (block.kind === "thinking") {
        html += `<div class="thinking-block" data-type="thinking">
          <div class="thinking-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="thinking-chevron">&#9654;</span> Thinking...
          </div>
          <div class="thinking-body">${escapeHtml(block.text)}</div>
        </div>`;
      } else if (block.kind === "tool_use" && block.tool_call) {
        const tc = block.tool_call;
        const preview = truncate(tc.input, 60);
        let bodyHtml = `<div class="tool-input"><div class="tool-input-label">Input</div>${formatInput(tc.input)}</div>`;
        if (tc.result != null) {
          bodyHtml += `<div class="tool-result" data-type="result"><div class="tool-result-label">Result</div>${escapeHtml(tc.result)}</div>`;
        }
        html += `<div class="tool-block" data-type="tool">
          <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="tool-indicator"></span>
            <span class="tool-name">${escapeHtml(tc.name)}</span>
            <span class="tool-args-preview">${escapeHtml(preview)}</span>
            <span class="tool-chevron">&#9654;</span>
          </div>
          <div class="tool-body">${bodyHtml}</div>
        </div>`;
      }
    }

    el.innerHTML = html;
    return el;
  }

  function updateProgress() {
    const total = TURNS.length;
    const pct = total ? (currentTurn / total) * 100 : 0;
    progressFill.style.width = pct + "%";
    progressText.textContent = currentTurn + " / " + total;
  }

  function showUpTo(index) {
    // Render turns that haven't been rendered yet
    const existing = transcript.children.length;
    for (let i = existing; i < index && i < TURNS.length; i++) {
      const el = renderTurn(TURNS[i]);
      transcript.appendChild(el);
      // Trigger reflow for animation
      el.offsetHeight;
      el.classList.add("visible");
    }
    currentTurn = Math.min(index, TURNS.length);
    updateProgress();

    // Scroll to latest
    if (currentTurn > 0) {
      const last = transcript.children[currentTurn - 1];
      if (last) last.scrollIntoView({ behavior: "smooth", block: "end" });
    }
  }

  function stepForward() {
    if (currentTurn < TURNS.length) {
      showUpTo(currentTurn + 1);
    } else {
      stopPlay();
    }
  }

  function stepBack() {
    if (currentTurn > 1) {
      // Remove last turn, but never go below 1 (always keep first turn visible)
      const last = transcript.children[currentTurn - 1];
      if (last) {
        last.classList.remove("visible");
        setTimeout(() => last.remove(), 300);
      }
      currentTurn--;
      updateProgress();
    }
  }

  function startPlay() {
    if (currentTurn >= TURNS.length) {
      // Reset if at end
      transcript.innerHTML = "";
      currentTurn = 0;
      showUpTo(1); // Show first turn immediately
    }
    playing = true;
    btnPlay.innerHTML = "&#9646;&#9646;";
    btnPlay.classList.add("active");
    scheduleNext();
  }

  function stopPlay() {
    playing = false;
    btnPlay.innerHTML = "&#9654;";
    btnPlay.classList.remove("active");
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  }

  function scheduleNext() {
    if (!playing) return;
    const delay = 1500 / speed;
    playTimer = setTimeout(() => {
      if (!playing) return;
      stepForward();
      if (currentTurn < TURNS.length) {
        scheduleNext();
      } else {
        stopPlay();
      }
    }, delay);
  }

  function applyVisibility() {
    const showThinking = toggleThinking.checked;
    const showTools = toggleTools.checked;
    const showResults = toggleResults.checked;

    for (const el of $$('[data-type="thinking"]')) {
      el.style.display = showThinking ? "" : "none";
    }
    for (const el of $$('[data-type="tool"]')) {
      el.style.display = showTools ? "" : "none";
    }
    for (const el of $$('[data-type="result"]')) {
      el.style.display = showResults ? "" : "none";
    }
  }

  // Event listeners
  btnPlay.addEventListener("click", () => playing ? stopPlay() : startPlay());
  btnNext.addEventListener("click", stepForward);
  btnPrev.addEventListener("click", stepBack);

  speedSlider.addEventListener("input", () => {
    speed = parseFloat(speedSlider.value);
    speedLabel.textContent = speed + "x";
  });

  progressBar.addEventListener("click", (e) => {
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const target = Math.round(pct * TURNS.length);
    // Reset and show up to target
    transcript.innerHTML = "";
    currentTurn = 0;
    showUpTo(target);
  });

  toggleThinking.addEventListener("change", applyVisibility);
  toggleTools.addEventListener("change", applyVisibility);
  toggleResults.addEventListener("change", applyVisibility);

  // Keyboard shortcuts
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === " " || e.key === "k") { e.preventDefault(); playing ? stopPlay() : startPlay(); }
    if (e.key === "ArrowRight" || e.key === "l") { e.preventDefault(); stepForward(); }
    if (e.key === "ArrowLeft" || e.key === "h") { e.preventDefault(); stepBack(); }
  });

  // Init
  updateProgress();
  // Show first turn immediately
  if (TURNS.length > 0) showUpTo(1);
})();
</script>
</body>
</html>
